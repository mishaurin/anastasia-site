[build]
  publish = "."

# ── Блокировка прямого доступа к папке photos/ ──
[[redirects]]
  from = "/photos/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["public"]}

# Запрет листинга директорий
[[headers]]
  for = "/photos/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Content-Security-Policy = "default-src 'self'"
    X-Content-Type-Options = "nosniff"

# ── Основные заголовки безопасности ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ── Кэширование фото (быстрая загрузка) ──
[[headers]]
  for = "/photos/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/photos/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/photos/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML и JSON всегда свежие ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/photos.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Редирект www → без www ──
[[redirects]]
  from = "https://www.anastasiamishurina.fr/*"
  to = "https://anastasiamishurina.fr/:splat"
  status = 301
  force = true
